<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Василиса | Official Bio</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #4b1d3f 0%, #0f0a1a 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding-bottom: 140px; 
            overflow-x: hidden;
        }

        /* العداد العلوي */
        .countdown-timer {
            position: fixed; top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f0abfc;
            z-index: 2000;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 35px;
            text-align: center;
            width: 85%;
            max-width: 380px;
        }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid #f0abfc;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(240, 171, 252, 0.3);
        }

        h1 { margin: 10px 0; font-size: 28px; }
        .info-row {
            background: rgba(0, 0, 0, 0.4);
            margin: 8px 0; padding: 12px;
            border-radius: 15px; font-size: 15px;
            display: flex; align-items: center; gap: 12px;
            text-align: left;
        }

        #celebration-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            justify-content: center; align-items: center;
            flex-direction: column;
            text-align: center;
        }

        /* شريط الموسيقى السفلي */
        .music-dock {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 25px; padding: 12px;
            display: flex; justify-content: space-around;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .album-box { text-align: center; cursor: pointer; }
        .album-art {
            width: 60px; height: 60px;
            border-radius: 12px; margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .playing { border-color: #f0abfc; box-shadow: 0 0 15px #f0abfc; transform: scale(1.1); }
        
        .heart { position: absolute; color: #ff4d4d; animation: float 4s linear infinite; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="countdown-timer" id="timer">Loading...</div>

    <div class="card">
        <img src="https://i.ibb.co/Kzx5pg9y/IMG-20260501-151308-526.jpg" alt="Vasilisa" class="profile-img">
        <h1>Василиса</h1>
        <div class="info-row">🎨 <span>Художник (Artist)</span></div>
        <div class="info-row">🔢 <span>Любит математику</span></div>
        <div class="info-row">🍣 <span>Любимая еда: Роллы</span></div>
        <p style="font-style: italic; opacity: 0.7;">"Искусство и логика" ✨</p>
    </div>

    <div id="celebration-overlay">
        <h1 style="color: #f9d71c; font-size: 2.5rem;">С днём рождения, Василиса! 🎂</h1>
        <p style="font-size: 1.2rem;">Пусть каждый твой день будет шедевром! 🎨✨</p>
        <button onclick="document.getElementById('celebration-overlay').style.display='none'" style="margin-top:20px; padding:10px 25px; border-radius:20px; border:none; cursor:pointer; background:#f0abfc; font-weight:bold;">Продолжить</button>
    </div>

    <div class="music-dock">
        <div class="album-box" onclick="handleMusic('asteria_WHAT_YOU_WANT!_feat._p_v_-_asteria_WHAT_YOU_WANT!.mp3', this)">
            <img src="https://i.ibb.co/cSN4PfS7/hqdefault.jpg" class="album-art">
            <div style="font-size: 9px;">Asteria</div>
        </div>
        <div class="album-box" onclick="handleMusic('Release_cabbage_(feat._Ulysse)_(..._-_Release_cabbage_(feat._Ulysse)_(.mp3', this)">
            <img src="https://i.ibb.co/9msf2dw8/hq720.jpg" class="album-art">
            <div style="font-size: 9px;">Cabbage</div>
        </div>
        <div class="album-box" onclick="handleMusic('Aiobahn_+81_feat._KOTOKO_INT..._-_Aiobahn_+81_feat._KOTOKO_INT.mp3', this)">
            <img src="https://i.ibb.co/gLn9Dfs5/artworks-1-ODo6tfg2-Uyzz-Fmj-I0-Fp-Vg-t500x500-1.jpg" class="album-art">
            <div style="font-size: 9px;">Aiobahn</div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // 1. نظام العداد الزمني (يعيد نفسه تلقائياً كل سنة)
        function updateTimer() {
            const now = new Date();
            let year = now.getFullYear();
            // شهر نوفمبر هو 10 برمجياً
            let bday = new Date(year, 10, 1); 

            // لو التاريخ الحالي بعد عيد ميلاد السنة دي، نحسب للسنة الجاية
            if (now > bday && (now.getDate() !== 1 || now.getMonth() !== 10)) {
                bday = new Date(year + 1, 10, 1);
            }

            const diff = bday - now;
            const timerDiv = document.getElementById('timer');
            const overlay = document.getElementById('celebration-overlay');

            // إذا كان اليوم هو 1 نوفمبر
            if (now.getMonth() === 10 && now.getDate() === 1) {
                timerDiv.innerHTML = "🎉 С днем рождения! 🎉";
                overlay.style.display = 'flex';
            } else {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                timerDiv.innerHTML = `Birthday in: ${d}d ${h}h ${m}m ${s}s`;
                overlay.style.display = 'none';
            }
        }
        setInterval(updateTimer, 1000);

        // 2. نظام تشغيل الموسيقى
        const player = document.getElementById('audio-player');
        let current = "";

        function handleMusic(file, el) {
            const img = el.querySelector('.album-art');
            if (current === file) {
                player.paused ? player.play() : player.pause();
                img.classList.toggle('playing');
                return;
            }
            document.querySelectorAll('.album-art').forEach(i => i.classList.remove('playing'));
            player.src = file;
            player.play().then(() => {
                img.classList.add('playing');
                current = file;
            }).catch(err => console.log("Auto-play prevented or file not found."));
        }

        // 3. تأثير القلوب الطائرة
        setInterval(() => {
            const h = document.createElement("div");
            h.className = "heart"; h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 600);
    </script>
</body>
</html>
